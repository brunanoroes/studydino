<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#4d7c3f"/>
      <stop offset="100%" stop-color="#1a3a1f"/>
    </radialGradient>
  </defs>

  <!-- Base -->
  <rect width="1440" height="900" fill="#1e4620"/>

  <!-- Large blob top-left -->
  <ellipse cx="200" cy="120" rx="320" ry="280" fill="#2d6e2a" opacity="0.7" transform="rotate(-15 200 120)"/>

  <!-- Large blob bottom-right -->
  <ellipse cx="1280" cy="780" rx="360" ry="300" fill="#2d6e2a" opacity="0.6" transform="rotate(20 1280 780)"/>

  <!-- Mid lime blob center -->
  <ellipse cx="750" cy="500" rx="420" ry="360" fill="#5a9e3a" opacity="0.25" transform="rotate(-5 750 500)"/>

  <!-- Small accent top-right -->
  <ellipse cx="1350" cy="100" rx="180" ry="150" fill="#3d8c30" opacity="0.5" transform="rotate(10 1350 100)"/>

  <!-- Small accent bottom-left -->
  <ellipse cx="100" cy="800" rx="200" ry="170" fill="#3d8c30" opacity="0.45"/>

  <!-- Leaf 1 — top right, large outline -->
  <g transform="translate(1100, 30) rotate(20)" opacity="0.35">
    <path d="M0,0 C30,-80 120,-100 160,-40 C200,20 160,120 80,140 C20,150 -20,80 0,0 Z" fill="none" stroke="#7bc950" stroke-width="2.5"/>
    <line x1="80" y1="140" x2="80" y2="0" stroke="#7bc950" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="100" x2="130" y2="60" stroke="#7bc950" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="70" x2="40" y2="40" stroke="#7bc950" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Leaf 2 — bottom left -->
  <g transform="translate(60, 700) rotate(-30)" opacity="0.3">
    <path d="M0,0 C20,-60 90,-80 120,-30 C150,20 120,90 60,105 C15,112 -15,60 0,0 Z" fill="none" stroke="#7bc950" stroke-width="2"/>
    <line x1="60" y1="105" x2="60" y2="0" stroke="#7bc950" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Leaf cluster top-left -->
  <g transform="translate(280, 20) rotate(10)" opacity="0.28">
    <path d="M0,0 C15,-50 70,-65 95,-25 C118,15 95,72 47,83 C12,90 -12,50 0,0 Z" fill="none" stroke="#9ed660" stroke-width="2"/>
    <line x1="47" y1="83" x2="47" y2="0" stroke="#9ed660" stroke-width="1.2" opacity="0.5"/>
  </g>
  <g transform="translate(340, 10) rotate(35)" opacity="0.22">
    <path d="M0,0 C10,-35 50,-45 65,-18 C80,10 65,50 33,58 C8,63 -8,35 0,0 Z" fill="none" stroke="#9ed660" stroke-width="1.5"/>
    <line x1="33" y1="58" x2="33" y2="0" stroke="#9ed660" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Filled leaf top-right -->
  <g transform="translate(1300, 220) rotate(-40)" opacity="0.18">
    <path d="M0,0 C25,-70 100,-90 135,-35 C170,20 135,105 68,120 C18,130 -17,70 0,0 Z" fill="#5a9e3a"/>
    <line x1="68" y1="120" x2="68" y2="0" stroke="#3d6e25" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Leaf bottom right outline -->
  <g transform="translate(1350, 680) rotate(15)" opacity="0.3">
    <path d="M0,0 C18,-55 80,-70 108,-28 C135,15 108,82 54,95 C14,102 -14,56 0,0 Z" fill="none" stroke="#9ed660" stroke-width="2"/>
    <line x1="54" y1="95" x2="54" y2="0" stroke="#9ed660" stroke-width="1.2" opacity="0.5"/>
    <line x1="54" y1="65" x2="90" y2="35" stroke="#9ed660" stroke-width="1" opacity="0.4"/>
    <line x1="54" y1="42" x2="22" y2="22" stroke="#9ed660" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Small fern cluster bottom-center -->
  <g transform="translate(650, 820) rotate(0)" opacity="0.25">
    <path d="M0,0 C5,-20 25,-28 38,-10 C50,8 38,32 19,38 C5,42 -5,22 0,0 Z" fill="#5a9e3a"/>
    <path d="M20,0 C25,-20 45,-28 58,-10 C70,8 58,32 39,38 C25,42 15,22 20,0 Z" fill="#5a9e3a"/>
    <path d="M10,-5 C10,-30 30,-40 45,-18 C58,5 45,38 25,45 C10,50 0,27 10,-5 Z" fill="none" stroke="#9ed660" stroke-width="1.5"/>
  </g>
</svg>
